spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://users-db:5432/users}
    username: ${SPRING_DATASOURCE_USERNAME:ecocycle}
    password: ${SPRING_DATASOURCE_PASSWORD:ecocycle}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  main:
    allow-bean-definition-overriding: true
server:
  port: 8083

jwt:
  secret: my-super-long-secret-key-ecocycle-123456789  # keep same across services
  expiration: 86400000   # 1 day in ms


