name: CD Pipeline - Production Deployment

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # Must match name: CI Pipeline
    types:
      - completed
    branches:
      - 'main'
      - 'release/production'

env:
  ANSIBLE_HOST: 152.7.176.20
  ANSIBLE_USER: mdshah5
  DOCKERHUB_USERNAME: manavshah13

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    
    # Only run if CI Pipeline succeeded
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Ansible
        run: |
          pip install ansible
          pip install ansible-lint
          ansible-galaxy collection install community.docker
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.ANSIBLE_HOST }} >> ~/.ssh/known_hosts
      
      - name: Test Ansible connection
        run: |
          ansible -i ansible/inventory/production.ini production -m ping
      
      - name: Deploy to Production
        run: |
          cd ansible
          
          # Use 'latest' tag which is built by CI pipeline
          # CI builds and pushes 'latest' tag on every push to main/release/production
          IMAGE_TAG="latest"
          
          echo "🚀 Deploying to PRODUCTION with image tag: ${IMAGE_TAG}"
          echo "🌿 Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          echo "🔨 Built from commit: ${{ github.event.workflow_run.head_sha }}"
          
          ansible-playbook -i inventory/production.ini playbooks/deploy_production.yml \
            -e "image_tag=${IMAGE_TAG}" \
            -e "dockerhub_username=${{ env.DOCKERHUB_USERNAME }}" \
            -e "dockerhub_token=${{ secrets.DOCKERHUB_TOKEN }}" \
            -e "manual_approval=false"
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
      
      - name: Verify deployment
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ env.ANSIBLE_HOST }}:8080" >> $GITHUB_STEP_SUMMARY
          echo "- Marketplace: http://${{ env.ANSIBLE_HOST }}:9081" >> $GITHUB_STEP_SUMMARY
          echo "- Users: http://${{ env.ANSIBLE_HOST }}:9083" >> $GITHUB_STEP_SUMMARY
          echo "- Transactions: http://${{ env.ANSIBLE_HOST }}:9082" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Health Checks:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ env.ANSIBLE_HOST }}:8080/health" >> $GITHUB_STEP_SUMMARY
          echo "- Marketplace: http://${{ env.ANSIBLE_HOST }}:9081/actuator/health" >> $GITHUB_STEP_SUMMARY
          echo "- Users: http://${{ env.ANSIBLE_HOST }}:9083/actuator/health" >> $GITHUB_STEP_SUMMARY
          echo "- Transactions: http://${{ env.ANSIBLE_HOST }}:9082/actuator/health" >> $GITHUB_STEP_SUMMARY
