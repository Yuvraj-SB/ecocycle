name: CD Pipeline - Staging Deployment

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # Must match name: CI Pipeline
    types:
      - completed
    branches:
      - 'release/staging'

env:
  ANSIBLE_HOST: 152.7.176.20
  ANSIBLE_USER: mdshah5
  DOCKERHUB_USERNAME: manavshah13

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted

    # Only run if CI Pipeline succeeded
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Ansible
        run: |
          pip install ansible
          pip install ansible-lint
          ansible-galaxy collection install community.docker
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.ANSIBLE_HOST }} >> ~/.ssh/known_hosts
      
      - name: Test Ansible connection
        run: |
          ansible -i ansible/inventory/staging.ini staging -m ping
      
      - name: Deploy to Staging
        run: |
          cd ansible
          
          # Use 'latest' tag which is built by CI pipeline
          # CI builds and pushes 'latest' tag on every push to release/staging
          IMAGE_TAG="latest"
          
          echo "📦 Deploying Docker images with tag: ${IMAGE_TAG}"
          echo "🌿 Triggered by branch: ${{ github.event.workflow_run.head_branch }}"
          echo "🔨 Built from commit: ${{ github.event.workflow_run.head_sha }}"
          
          ansible-playbook -i inventory/staging.ini playbooks/deploy_staging.yml \
            -e "image_tag=${IMAGE_TAG}" \
            -e "dockerhub_username=${{ env.DOCKERHUB_USERNAME }}" \
            -e "dockerhub_token=${{ secrets.DOCKERHUB_TOKEN }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
      
      - name: Verify deployment
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.event.workflow_run.head_branch || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ env.ANSIBLE_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Marketplace: http://${{ env.ANSIBLE_HOST }}:8081" >> $GITHUB_STEP_SUMMARY
          echo "- Users: http://${{ env.ANSIBLE_HOST }}:8083" >> $GITHUB_STEP_SUMMARY
          echo "- Transactions: http://${{ env.ANSIBLE_HOST }}:8082" >> $GITHUB_STEP_SUMMARY

