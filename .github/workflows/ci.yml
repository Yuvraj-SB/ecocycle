name: CI Pipeline

on:
  push:
    branches:
      - '**'  # Run on all branches
  pull_request:
    branches:
      - 'release/**'
      - 'main'
  workflow_dispatch:
    inputs:
      quick_test:
        description: 'Skip tests and go straight to build (for CD testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: manavshah13
  IMAGE_PREFIX: manavshah13/ecocycle
  SERVICES: marketplace-service users-service transactions-service frontend

jobs:
  # Job 0: Validation
  validate:
    name: Validate Project Structure
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Quick test mode - Skip validation
        if: github.event.inputs.quick_test == 'true'
        run: |
          echo "⏩ Quick test mode: Skipping validation"
          echo "✅ Validation skipped (quick test mode)"
      
      - name: Clean workspace
        if: github.event.inputs.quick_test != 'true'
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
      
      - name: Verify service directories exist
        if: github.event.inputs.quick_test != 'true'
        run: |
          echo "Validating project structure..."
          for service in marketplace-service users-service transactions-service frontend; do
            if [ ! -d "$service" ]; then
              echo "❌ ERROR: Directory $service not found!"
              exit 1
            fi
            echo "✅ Found: $service"
          done
          echo "✅ All service directories validated successfully"

  # Job 1: Code Quality & Linting
  code-quality:
    name: Code Quality & Linting
    runs-on: self-hosted
    needs: validate
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Quick test mode - Skip code quality checks
        if: github.event.inputs.quick_test == 'true'
        run: |
          echo "⏩ Quick test mode: Skipping code quality checks"
          echo "✅ Code quality checks skipped (quick test mode)"
      
      - name: Clean workspace
        if: github.event.inputs.quick_test != 'true'
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker permissions
        run: |
          # Ensure runner user can access Docker socket
          sudo chmod 666 /var/run/docker.sock || true

      - name: Run Checkstyle on Marketplace Service
        run: |
          cd marketplace-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn checkstyle:check
        continue-on-error: false

      - name: Run Checkstyle on Users Service
        run: |
          cd users-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn checkstyle:check
        continue-on-error: false

      - name: Run Checkstyle on Transactions Service
        run: |
          cd transactions-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn checkstyle:check
        continue-on-error: false
      
      - name: Cleanup target directories
        if: always()
        run: |
          # Fix ownership of Docker-created files
          sudo chown -R $USER:$USER ${{ github.workspace }}/*/target || true

  # Job 2: Unit Tests & Code Coverage
  test:
    name: Unit Tests & Coverage
    runs-on: self-hosted
    needs: [validate, code-quality]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Quick test mode - Skip tests
        if: github.event.inputs.quick_test == 'true'
        run: |
          echo "⏩ Quick test mode: Skipping unit tests"
          echo "✅ Tests skipped (quick test mode)"
      
      - name: Clean workspace
        if: github.event.inputs.quick_test != 'true'
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker permissions
        run: |
          sudo chmod 666 /var/run/docker.sock || true

      - name: Test Marketplace Service
        run: |
          cd marketplace-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn clean test jacoco:report

      - name: Test Users Service
        run: |
          cd users-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn clean test jacoco:report

      - name: Test Transactions Service
        run: |
          cd transactions-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn clean test jacoco:report

      - name: Fix file permissions for coverage reports
        if: always()
        run: |
          # Fix ownership so GitHub Actions can read the reports
          sudo chown -R $USER:$USER ${{ github.workspace }}/*/target || true

      - name: Upload Marketplace Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./marketplace-service/target/site/jacoco/jacoco.xml
          flags: marketplace
          name: marketplace-coverage
        continue-on-error: true

      - name: Upload Users Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./users-service/target/site/jacoco/jacoco.xml
          flags: users
          name: users-coverage
        continue-on-error: true

      - name: Upload Transactions Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./transactions-service/target/site/jacoco/jacoco.xml
          flags: transactions
          name: transactions-coverage
        continue-on-error: true
      
      - name: Cleanup target directories
        if: always()
        run: |
          # Clean up Docker-created files for next run
          sudo rm -rf ${{ github.workspace }}/*/target || true

  # Job 3: Static Analysis
  static-analysis:
    name: Static Analysis
    runs-on: self-hosted
    needs: [validate, code-quality]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Quick test mode - Skip static analysis
        if: github.event.inputs.quick_test == 'true'
        run: |
          echo "⏩ Quick test mode: Skipping static analysis"
          echo "✅ Static analysis skipped (quick test mode)"
      
      - name: Clean workspace
        if: github.event.inputs.quick_test != 'true'
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker permissions
        run: |
          sudo chmod 666 /var/run/docker.sock || true

      - name: Run SpotBugs on Marketplace Service
        run: |
          cd marketplace-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn compile spotbugs:check || true
        continue-on-error: true

      - name: Run SpotBugs on Users Service
        run: |
          cd users-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn compile spotbugs:check || true
        continue-on-error: true

      - name: Run SpotBugs on Transactions Service
        run: |
          cd transactions-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn compile spotbugs:check || true
        continue-on-error: true
      
      - name: Cleanup target directories
        if: always()
        run: |
          # Fix ownership of Docker-created files
          sudo chown -R $USER:$USER ${{ github.workspace }}/*/target || true

  # Job 4: Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: self-hosted
    needs: [validate, code-quality]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Quick test mode - Skip security scanning
        if: github.event.inputs.quick_test == 'true'
        run: |
          echo "⏩ Quick test mode: Skipping security scanning"
          echo "✅ Security scanning skipped (quick test mode)"
      
      - name: Clean workspace
        if: github.event.inputs.quick_test != 'true'
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker permissions
        run: |
          sudo chmod 666 /var/run/docker.sock || true

      - name: Run OWASP Dependency Check on Marketplace
        run: |
          cd marketplace-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn dependency-check:check || true
        continue-on-error: true

      - name: Run OWASP Dependency Check on Users
        run: |
          cd users-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn dependency-check:check || true
        continue-on-error: true

      - name: Run OWASP Dependency Check on Transactions
        run: |
          cd transactions-service
          docker run --rm -v "$PWD":/app -v "$HOME/.m2":/root/.m2 -w /app maven:3.9.6-eclipse-temurin-17 mvn dependency-check:check || true
        continue-on-error: true

      - name: Fix file permissions for reports
        if: always()
        run: |
          # Fix ownership so GitHub Actions can read the reports
          sudo chown -R $USER:$USER ${{ github.workspace }}/*/target || true

      - name: Upload OWASP Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: owasp-reports
          path: |
            marketplace-service/target/dependency-check-report.html
            users-service/target/dependency-check-report.html
            transactions-service/target/dependency-check-report.html
        continue-on-error: true
      
      - name: Cleanup target directories
        if: always()
        run: |
          # Clean up Docker-created files for next run
          sudo rm -rf ${{ github.workspace }}/*/target || true

  # Job 5: Build Docker Images
  build-images:
    name: Build & Push Docker Images
    runs-on: self-hosted
    needs: [test, static-analysis, security-scan]
    # Build images on:
    # - Push to any branch (for development/testing)
    # - PR to release/* branches (for CD pipeline deployment)
    # - PR to main (for validation, but main doesn't trigger deployment)
    # - Manual workflow_dispatch (for quick testing)
    if: |
      always() &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' && 
        (startsWith(github.head_ref, 'release/') || 
         startsWith(github.base_ref, 'release/') ||
         github.base_ref == 'main'))) 
    
    permissions:
      contents: read
      packages: write
      id-token: write
    
    strategy:
      matrix:
        service: [marketplace-service, users-service, transactions-service, frontend]
    
    steps:
      - name: Clean workspace
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
      
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fix /tmp permissions for Docker
        run: |
          # Ensure /tmp exists and has proper permissions
          sudo mkdir -p /tmp
          sudo chmod 1777 /tmp
          # Create a workspace-specific temp directory for Docker actions
          mkdir -p ${{ runner.temp }}/docker-tmp
          chmod 777 ${{ runner.temp }}/docker-tmp
          # Ensure the runner user owns the temp directory
          sudo chown -R $USER:$USER ${{ runner.temp }}/docker-tmp || true
          # Test write access
          touch ${{ runner.temp }}/docker-tmp/test-write && rm ${{ runner.temp }}/docker-tmp/test-write || echo "Warning: Write test failed"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        env:
          TMPDIR: ${{ runner.temp }}/docker-tmp

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        env:
          TMPDIR: ${{ runner.temp }}/docker-tmp
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v4
        env:
          TMPDIR: ${{ runner.temp }}/docker-tmp
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/ecocycle-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=pr,format=pr-{{number}}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        env:
          TMPDIR: ${{ runner.temp }}/docker-tmp
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/ecocycle-${{ matrix.service }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
        continue-on-error: true

  # Job 6: Integration Tests (Optional - for bonus)
  integration-tests:
    name: Integration Tests
    runs-on: self-hosted
    needs: build-images
    # Run integration tests on push OR on PR to release branches
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && 
       (startsWith(github.head_ref, 'release/') || 
        startsWith(github.base_ref, 'release/')))
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ecocycle
          POSTGRES_USER: ecocycle
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Clean workspace
        run: |
          # Remove target directories with root-owned files from previous runs
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
      
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytest pytest-html
        continue-on-error: true

      - name: Run integration tests
        run: |
          echo "Integration tests would run here"
          # python tests/integration/test_all.py
        continue-on-error: true

  # Job 7: Build Summary
  build-summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [validate, code-quality, test, static-analysis, security-scan, build-images]
    if: always()
    
    steps:
      - name: Clean workspace
        run: |
          # Final cleanup of all target directories
          sudo rm -rf ${{ github.workspace }}/*/target || true
          sudo chown -R $USER:$USER ${{ github.workspace }} || true
      
      - name: Check build status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Static Analysis: ${{ needs.static-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build Images: ${{ needs.build-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: needs.code-quality.result == 'failure' || needs.test.result == 'failure' || needs.static-analysis.result == 'failure'
        run: exit 1

