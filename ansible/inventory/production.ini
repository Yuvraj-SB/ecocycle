[production]
prod-vm ansible_host=152.7.176.20 ansible_user=mdshah5

[production:vars]
# Environment
env_name=production
deploy_user=mdshah5

# Application Configuration
app_name=ecocycle
app_dir=/home/mdshah5/ecocycle-project
compose_file=docker-compose.prod.yml

# Docker Configuration
docker_compose_version=2.24.0
docker_registry=docker.io
dockerhub_username=manavshah13
image_tag=latest

# Database Configuration
db_username=ecocycle
db_password={{ vault_db_password | default('change-this-secure-password') }}

# Service Ports
marketplace_port=8081
transactions_port=8082
users_port=8083

# Health Check Configuration
health_check_retries=15
health_check_delay=15
health_check_timeout=10

# Backup Configuration
backup_dir=/home/mdshah5/ecocycle-project/backups
backup_retention_days=30

# Production Specific
enable_monitoring=true
enable_ssl=false

