[staging]
staging-vm ansible_host=152.7.176.20 ansible_user=mdshah5

[staging:vars]
# Environment
env_name=staging
deploy_user=mdshah5

# Application Configuration
app_name=ecocycle
app_dir=/home/mdshah5/ecocycle-staging
compose_file=docker-compose.staging.yml

# Docker Configuration
docker_compose_version=2.24.0
docker_registry=docker.io
dockerhub_username=manavshah13
image_tag=latest

# Database Configuration
db_username=ecocycle
db_password={{ vault_db_password | default('ecocycle') }}

# Service Ports
frontend_port=80
marketplace_port=8081
transactions_port=8082
users_port=8083

# Health Check Configuration
health_check_retries=10
health_check_delay=10
health_check_timeout=5

# Backup Configuration
backup_dir=/home/mdshah5/ecocycle-staging/backups
backup_retention_days=7

