spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://transactions-db:5432/transactions}
    username: ${SPRING_DATASOURCE_USERNAME:ecocycle}
    password: ${SPRING_DATASOURCE_PASSWORD:ecocycle}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8082

marketplace:
  base-url: ${MARKETPLACE_BASE_URL:http://marketplace:8081}

users:
  base-url: ${USERS_BASE_URL:http://users:8083}

jwt:
  secret: my-super-long-secret-key-ecocycle-123456789   # keep same across services
  expiration: 86400000   # 1 day in ms